            animation: float 4s ease-in-out infinite;

<body class="bg-surface-dim text-on-surface selection:bg-primary/30 min-h-screen flex flex-col font-body-main">
<!-- Ambient Background Blobs -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute top-[20%] -right-[10%] w-[40%] h-[40%] bg-tertiary/5 blur-[120px] rounded-full"></div>
</div>
<!-- Header (Based on Shared Components Brand Anchor) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-padding-mobile h-16 backdrop-blur-xl border-b border-white/5">
<div class="font-display-lg text-[24px] tracking-tighter text-primary">
            WalletFlow AI
        </div>
<button class="font-label-mono text-label-mono uppercase text-on-surface-variant hover:text-primary transition-colors px-4 py-2">
            Skip
        </button>
</header>
<main class="flex-grow flex flex-col items-center justify-center pt-24 pb-32 px-container-padding-mobile max-w-lg mx-auto w-full">
<!-- Illustration Canvas -->
<div class="relative w-full aspect-square max-w-[340px] mb-12 flex items-center justify-center">
<!-- Background Radial Glow -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary/20 to-transparent rounded-full blur-3xl opacity-50"></div>
<!-- Main Illustration Component -->
<div class="relative w-full h-full flex items-center justify-center">
<!-- Floating Wallet Illustration (Bento Style Card) -->
<div class="absolute z-20 w-48 h-32 glass-card rounded-2xl glow-accent border-primary/20 flex flex-col p-4 animate-float">
<div class="flex justify-between items-start mb-auto">
<div class="w-10 h-6 bg-white/10 rounded border border-white/10"></div>
<span class="material-symbols-outlined text-primary text-[20px]">contactless</span>
</div>
<div>
<p class="font-label-mono text-[10px] text-white/40 uppercase tracking-widest">Main Wallet</p>
<p class="font-display-lg text-[18px] tracking-tight text-white">$24,409.00</p>
</div>
</div>
<!-- Floating Expense Card 1 -->
<div class="absolute z-30 -bottom-4 -right-4 w-40 glass-card rounded-xl border-white/10 p-3 shadow-2xl animate-float-delayed">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-sm">shopping_bag</span>
</div>
<div>
<p class="text-[12px] font-semibold text-white">Apple Store</p>
<p class="text-[10px] text-on-surface-variant">-$1,299.00</p>
</div>
</div>
</div>
<!-- Floating Expense Card 2 -->
<div class="absolute z-10 -top-6 -left-2 w-36 glass-card rounded-xl border-white/5 p-3 opacity-80 blur-[1px] animate-float">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-tertiary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary text-sm">restaurant</span>
</div>
<div>
<p class="text-[12px] font-semibold text-white">Dining</p>
<p class="text-[10px] text-on-surface-variant">-$42.50</p>
</div>
</div>
</div>
<!-- Abstract Graph Line (SVG Placeholder) -->
<div class="absolute inset-0 opacity-30 flex items-center justify-center">
<div class="w-[280px] h-32 border-b border-primary/20 relative overflow-hidden">
<div class="absolute bottom-0 left-0 w-full h-full bg-gradient-to-t from-primary/5 to-transparent"></div>
<svg class="w-full h-full" preserveaspectratio="none" viewbox="0 0 100 40">
<path class="text-primary" d="M0,35 Q10,32 20,28 T40,20 T60,15 T80,8 T100,2" fill="none" stroke="currentColor" stroke-width="0.5"></path>
</svg>
</div>
</div>
</div>
</div>
<!-- Content Section -->
<div class="text-center space-y-4">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface tracking-tight">
                Track Every <span class="text-primary">Expense</span>
</h1>
<p class="font-body-main text-on-surface-variant max-w-[320px] mx-auto opacity-80">
                Connect your accounts and let our AI categorize every cent. Gain total clarity on where your money goes without lifting a finger.
            </p>
</div>
</main>
<!-- Footer Controls -->
<footer class="fixed bottom-0 w-full px-container-padding-mobile pb-12 pt-8 flex flex-col items-center gap-8 bg-gradient-to-t from-surface-dim to-transparent">
<!-- Pagination Dots -->
<div class="flex gap-3 items-center">
<div class="w-2 h-2 rounded-full bg-on-surface-variant/30"></div>
<div class="w-6 h-2 rounded-full bg-primary glow-accent"></div>
<div class="w-2 h-2 rounded-full bg-on-surface-variant/30"></div>
</div>
<!-- Primary Action -->
<div class="w-full max-w-sm">
<button class="w-full h-16 bg-primary text-on-primary font-button-text text-button-text rounded-2xl flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-[0_8px_20px_rgba(78,222,163,0.3)]">
                Next
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</footer>
<!-- Interactive Atmospheric Elements -->
<script>
        document.addEventListener('mousemove', (e) => {
            const blobs = document.querySelectorAll('.fixed > div');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            blobs[0].style.transform = `translate(${x * 30}px, ${y * 30}px)`;
            blobs[1].style.transform = `translate(${x * -40}px, ${y * -40}px)`;
        });

        // Soft interaction for the "Next" button
        const nextBtn = document.querySelector('button.bg-primary');
        nextBtn.addEventListener('click', () => {
            nextBtn.classList.add('opacity-80');
            setTimeout(() => {
                nextBtn.classList.remove('opacity-80');
                // Navigation logic would go here
            }, 200);
        });
    </script>
