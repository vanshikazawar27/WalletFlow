<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .scan-shimmer {
            background: linear-gradient(
                to bottom,
                transparent 0%,
                rgba(78, 222, 163, 0.2) 50%,
                rgba(78, 222, 163, 0.5) 50.5%,
                rgba(78, 222, 163, 0.2) 51%,
                transparent 100%
            );
            height: 100%;
            width: 100%;
            position: absolute;
            top: -100%;
            animation: scan 3s infinite linear;
        }

        @keyframes scan {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        .corner-border {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #4edea3;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glow-emerald {
            box-shadow: 0 0 20px rgba(78, 222, 163, 0.3);
        }

<body class="bg-background text-on-background min-h-screen font-body-main selection:bg-primary/30 overflow-hidden">

<div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">

</div>
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-xl border-b border-white/10 shadow-sm flex justify-between items-center px-container-padding-mobile h-16">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-sm" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
</div>
<h1 class="font-display-lg text-headline-md tracking-tighter text-primary dark:text-primary-fixed">WalletFlow AI</h1>
</div>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined">notifications</span>
</button>
<div class="w-8 h-8 rounded-full border border-primary/20 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A professional headshot of a young tech-savvy user, softly lit with cool blue and emerald green ambient lighting. The background is a blurred high-end office space. The image is crisp, high-resolution, and perfectly centered to serve as a user profile avatar." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC8E9j1uwg89Dm8xN9WPXEKRRk0BY-YpQkY0jcuNm87yMEZ4S97VAkdY6sqqrRljrV3tAT3CNvKPOlO84dVhWSBh-e1pal4v1l529TUJ-ZWiwU7Uy95lOYRGXKJ1iNHt9vQPOoX85Q0WxvK7GEmgC9YRC9OEHxB-_LQteLuyi1zuG2K7D5NaTNqsLh2wgP9a_EU_X4ST_f1rw8x5WXW9lsydR_2cu7aeFvTo4jh0FrRyFRkq8ZABki6jw"/>
</div>
</div>
</header>
<!-- Main Viewfinder Section -->
<main class="relative pt-16 pb-20 h-screen flex flex-col items-center justify-center px-container-padding-mobile">
<!-- Camera Viewport Container -->
<div class="relative w-full max-w-md aspect-[3/4] glass-panel rounded-3xl overflow-hidden shadow-2xl group">
<!-- Simulated Viewfinder Content -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-80 group-hover:scale-105 transition-transform duration-700" data-alt="A macro photograph of a crumpled paper store receipt placed on a dark, textured slate surface. The lighting is dramatic, with a sharp emerald green laser-like line projected across the text of the receipt to simulate a high-tech scanning process. Minimalist aesthetic with deep blacks and vibrant emerald accents." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDMcadLPyT0vKOdikd11Sh5zz8OQgqtgebAmTySlFzfqfwLEYAW0ZWjwvl9v6IZIDU3uMeDnXSTEROAhSaVoAEo2JWaWwUNrvu5PhLxEQNWEJvnwS0SK-fRWVb5HGROX_1dO3deJar4LwMj-kmFr7s4BkedPcC4zXzd5cMXrYSfEfqSWzBeY28d4nnKKP5EefP4ZZC6DDBYF_cZm2234wgE1TZ2HdLBts4rUSmmNOaQNOsoGlaUlyF_A"/>
</div>
<!-- Scanning Overlay -->
<div class="scan-shimmer z-10"></div>
<!-- Viewfinder Brackets -->
<div class="absolute top-8 left-8 corner-border border-t-4 border-l-4 rounded-tl-lg"></div>
<div class="absolute top-8 right-8 corner-border border-t-4 border-r-4 rounded-tr-lg"></div>
<div class="absolute bottom-8 left-8 corner-border border-b-4 border-l-4 rounded-bl-lg"></div>
<div class="absolute bottom-8 right-8 corner-border border-b-4 border-r-4 rounded-br-lg"></div>
<!-- Detection Highlights (Floating Labels) -->
<div class="absolute inset-0 z-20 pointer-events-none" id="detection-layer">
<!-- Detected Item 1 -->

<div class="flex items-center gap-2 bg-primary/90 text-on-primary px-3 py-1 rounded-full text-label-mono font-label-mono shadow-lg">
<span class="material-symbols-outlined text-[14px]">sell</span>
                        COFFEE BEANS
                    </div>
</div>
<!-- Detected Item 2 -->
<div class="absolute top-[45%] right-[15%] animate-pulse" style="animation-delay: 0.5s;">

</div>
<!-- Total Amount -->

</div>

<button class="flex-1 flex flex-col items-center gap-2 group">

</div>

<span class="material-symbols-outlined">home</span>
<span class="font-label-mono text-label-mono uppercase">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-variant/50 transition-colors active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-label-mono text-label-mono uppercase">History</span>

<span class="font-label-mono text-label-mono uppercase">Scan</span>
</a>

<span class="material-symbols-outlined">insights</span>
<span class="font-label-mono text-label-mono uppercase">Insights</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-variant/50 transition-colors active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-mono text-label-mono uppercase">Settings</span>
</a>
</nav>
<script>
        // Micro-interactions for simulated scanner
        document.addEventListener('DOMContentLoaded', () => {
            const detectionLayer = document.getElementById('detection-layer');
            const items = detectionLayer.querySelectorAll('div');
            
            // Randomly flicker detection items for "processing" effect
            setInterval(() => {
                const randomItem = items[Math.floor(Math.random() * items.length)];
                randomItem.style.opacity = '0.5';
                setTimeout(() => {
                    randomItem.style.opacity = '1';
                }, 150);
            }, 2000);

            // Shutter click interaction
            const shutterBtn = document.querySelector('button .material-symbols-outlined[data-icon="camera"]')?.parentElement?.parentElement;
            if (shutterBtn) {
                shutterBtn.addEventListener('click', () => {
                    document.body.style.backgroundColor = '#ffffff';
                    setTimeout(() => {
                        document.body.style.backgroundColor = '';
                        alert('Receipt captured! Processing items...');
                    }, 50);
                });
            }
        });
    </script>
</body></html>
