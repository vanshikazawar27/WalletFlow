<!-- Background Decorative Elements (Glassmorphism blobs) -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[120px] pointer-events-none -z-10"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-tertiary/10 rounded-full blur-[120px] pointer-events-none -z-10"></div>
<script>
        // Micro-interaction for toggle
        const toggle = document.getElementById('theme-toggle');
        toggle.addEventListener('change', () => {
            document.documentElement.classList.toggle('dark');
            // Mock notification of change
            console.log('Theme toggled. Current state:', document.documentElement.classList.contains('dark') ? 'Dark' : 'Light');
        });

        // Add subtle hover tracking effect to cards
        const cards = document.querySelectorAll('.glass-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
