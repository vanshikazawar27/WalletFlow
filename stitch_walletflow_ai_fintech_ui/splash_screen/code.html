<html class="dark" lang="en"><head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<style>
        @keyframes logo-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        @keyframes glow {
            0%, 100% { opacity: 0.3; filter: blur(40px); }
            50% { opacity: 0.6; filter: blur(60px); }
        }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-logo-float { animation: logo-float 4s ease-in-out infinite; }
        .animate-shimmer { animation: shimmer 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .animate-glow { animation: glow 6s ease-in-out infinite; }
        .animate-fade-in { animation: fade-in-up 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        .glass-background {
            background: radial-gradient(circle at center, #1e293b 0%, #031427 100%);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[1px] h-12 bg-gradient-to-b from-primary/40 to-transparent"></div>
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[1px] h-12 bg-gradient-to-t from-primary/40 to-transparent"></div>
</main>
<script>
        // Micro-interaction for mouse movement parallax effect
        document.addEventListener('mousemove', (e) => {
            const blobs = document.querySelectorAll('.animate-glow');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            blobs.forEach((blob, index) => {
                const speed = (index + 1) * 20;
                blob.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });

        // Simulate automatic transition after loading (for visual demo only)
        // In a real app, this would be tied to asset loading completion.
        setTimeout(() => {
            console.log("Splash sequence complete. Transitioning to main interface...");
        }, 4000);
    </script>
