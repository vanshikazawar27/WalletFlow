<!-- Floating Action Area -->
<div class="fixed bottom-0 w-full px-container-padding-mobile py-6 bg-gradient-to-t from-surface-dim via-surface-dim/95 to-transparent z-50">

</button>

<!-- AI Insight Overlay (Minimalist Toast) -->
<div class="fixed top-20 left-1/2 -translate-x-1/2 glass-card px-4 py-2 rounded-full border-primary/30 flex items-center gap-2 animate-bounce cursor-pointer z-40" id="ai-toast">
<span class="material-symbols-outlined text-primary text-[18px]">bolt</span>
<span class="font-label-mono text-[10px] uppercase text-primary">AI suggests Shopping based on location</span>
</div>
<script>
        // Simple micro-interactions
        const amountInput = document.querySelector('input[type="text"]');
        amountInput.addEventListener('focus', () => {
            amountInput.parentElement.classList.add('scale-105', 'transition-transform');
        });
        amountInput.addEventListener('blur', () => {
            amountInput.parentElement.classList.remove('scale-105');
        });

        // Hide AI toast after some time or on click
        const aiToast = document.getElementById('ai-toast');
        aiToast.addEventListener('click', () => {
            aiToast.style.opacity = '0';
            setTimeout(() => aiToast.remove(), 300);
        });

        // Currency formatting logic (Mock)
        amountInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^0-9.]/g, '');
            // Simple visual feedback only
        });
    </script>
