</div>
<h1 class="font-display-lg text-headline-md tracking-tighter text-primary">WalletFlow AI</h1>
</div>

<!-- Login Card -->

<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-mono text-label-mono text-outline uppercase tracking-widest block px-1">Email Address</label>
<div class="relative group">

<input class="w-full bg-surface-container-low border-b-2 border-transparent border-t-0 border-x-0 rounded-t-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 transition-all focus:bg-surface-container h-14" placeholder="name@company.com" type="email"/>
</div>
</div>

<div class="relative group">

<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary-container hover:bg-primary-container/90 active:scale-[0.98] transition-all duration-200 text-on-primary-container font-button-text py-4 rounded-lg shadow-lg shadow-primary/10 flex items-center justify-center gap-2 mt-4">
                        Login to Dashboard

</button>

<!-- Interactive Elements Script -->
<script>
        // Subtle mouse tracking for the glass card glow
        const card = document.querySelector('.glass-card');
        document.addEventListener('mousemove', (e) => {
            if (!card) return;
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            card.style.setProperty('--mouse-x', `${x}px`);
            card.style.setProperty('--mouse-y', `${y}px`);
        });

        // Simple button active state visual feedback
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                btn.classList.add('scale-95');
                setTimeout(() => btn.classList.remove('scale-95'), 100);
            });
        });

        // Handle placeholder images if any were needed (none in this specific layout request, but following system rules)
        // No img tags present in current high-fidelity layout.
    </script>
<!-- Custom CSS for the Dynamic Glow effect on the card -->
<style>

            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(800px circle at var(--mouse-x, 0) var(--mouse-y, 0), rgba(78, 222, 163, 0.06), transparent 40%);
            border-radius: inherit;
            pointer-events: none;
            z-index: 0;
        }
        form, .oauth-container, .divider {
