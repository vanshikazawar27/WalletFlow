<!-- Custom Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Simple parallax effect for bubbles on mouse move
            if (window.innerWidth > 768) {
                document.addEventListener('mousemove', (e) => {
                    const x = (window.innerWidth / 2 - e.pageX) / 50;
                    const y = (window.innerHeight / 2 - e.pageY) / 50;
                    const bubbles = document.querySelectorAll('.glass-card');
                    
                    bubbles.forEach((bubble, index) => {
                        const factor = (index + 1) * 0.5;
                        bubble.style.transform = `translate(${x * factor}px, ${y * factor}px) ${bubble.classList.contains('rotate-12') ? 'rotate(12deg)' : bubble.classList.contains('-rotate-6') ? 'rotate(-6deg)' : ''}`;
                    });
                });
            }

            // Button haptic simulation / success state
            const btn = document.querySelector('button');
            btn.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.width = '100px';
                ripple.style.height = '100px';
                ripple.style.background = 'rgba(255,255,255,0.3)';
                ripple.style.borderRadius = '50%';
                ripple.style.left = `${x - 50}px`;
                ripple.style.top = `${y - 50}px`;
                ripple.style.transform = 'scale(0)';
                ripple.style.transition = 'transform 0.5s ease-out, opacity 0.5s ease-out';
                ripple.style.pointerEvents = 'none';
                
                this.style.position = 'relative';
                this.style.overflow = 'hidden';
                this.appendChild(ripple);
                
                requestAnimationFrame(() => {
                    ripple.style.transform = 'scale(4)';
                    ripple.style.opacity = '0';
                });
                
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
